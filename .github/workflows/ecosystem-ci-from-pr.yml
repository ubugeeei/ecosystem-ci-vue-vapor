# integration tests for vue ecosystem - manually run against a vuejs/core PR ref
name: ecosystem-ci-from-pr

env:
  # 7 GiB by default on GitHub, setting to 6 GiB
  # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources
  NODE_OPTIONS: --max-old-space-size=6144
  VITE_GIT_HOOKS: "0"

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      prNumber:
        description: "PR number for operator context only (e.g. 9887)"
        required: true
        type: string
      branchName:
        description: "vue branch to use"
        required: true
        type: string
        default: "minor"
      repo:
        description: "vue repository to use"
        required: true
        type: string
        default: "vuejs/core"
      commit:
        description: "commit to use"
        type: string
      suite:
        description: "testsuite to run. runs all testsuites when `-`."
        required: false
        type: choice
        options:
          - "-"
          - elk
          - language-tools
          - misskey
          # - naive-ui
          - naive-ui-jsx-vapor
          - nuxt
          - npmx
          - pinia
          - primevue
          - quasar
          - radix-vue
          - router
          - test-utils
          - vant
          - vapor-interop-fuzz
          - vapor-vrt
          - vite-plugin-vue
          - vitepress
          - vue-jsx-vapor
          - vue-i18n
          - vue-macros
          - vuetify
          - vuetify-jsx-vapor
          - vueuse
          - vuefes-2025-website
          - vuejs-docs
          - vue-simple-compiler

jobs:
  execute-selected-suite:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    if: "inputs.suite != '-'"
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile

      - if: ${{ !inputs.commit }}
        id: ecosystem-ci-run-branch
        continue-on-error: true
        run: >-
          node ecosystem-ci.ts
          --branch ${{ inputs.branchName }}
          --repo ${{ inputs.repo }}
          ${{ inputs.suite }}
        env:
          COREPACK_ENABLE_STRICT: 0

      - if: ${{ inputs.commit }}
        id: ecosystem-ci-run-commit
        continue-on-error: true
        run: >-
          node ecosystem-ci.ts
          --commit ${{ inputs.commit }}
          --repo ${{ inputs.repo }}
          ${{ inputs.suite }}
        env:
          COREPACK_ENABLE_STRICT: 0

      - name: report failure to fork issue tracker
        if: steps.ecosystem-ci-run-branch.outcome == 'failure' || steps.ecosystem-ci-run-commit.outcome == 'failure'
        uses: ./.github/actions/report-failure
        with:
          suite: ${{ inputs.suite }}
          ref-type: ${{ inputs.commit && 'commit' || 'branch' }}
          ref: ${{ inputs.commit || inputs.branchName }}
          vue-repo: ${{ inputs.repo }}

  execute-all:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    if: "inputs.suite == '-'"
    strategy:
      matrix:
        suite:
          - elk
          - language-tools
          - misskey
          # - naive-ui
          - naive-ui-jsx-vapor
          - nuxt
          - npmx
          - pinia
          - primevue
          - quasar
          - radix-vue
          - router
          - test-utils
          - vant
          - vapor-interop-fuzz
          - vapor-vrt
          - vite-plugin-vue
          - vitepress
          - vue-jsx-vapor
          - vue-i18n
          - vue-macros
          - vuetify
          - vuetify-jsx-vapor
          - vueuse
          - vuefes-2025-website
          - vuejs-docs
          - vue-simple-compiler
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile

      - if: ${{ !inputs.commit }}
        id: ecosystem-ci-run-branch
        continue-on-error: true
        run: >-
          node ecosystem-ci.ts
          --branch ${{ inputs.branchName }}
          --repo ${{ inputs.repo }}
          ${{ matrix.suite }}
        env:
          COREPACK_ENABLE_STRICT: 0

      - if: ${{ inputs.commit }}
        id: ecosystem-ci-run-commit
        continue-on-error: true
        run: >-
          node ecosystem-ci.ts
          --commit ${{ inputs.commit }}
          --repo ${{ inputs.repo }}
          ${{ matrix.suite }}
        env:
          COREPACK_ENABLE_STRICT: 0

      - name: report failure to fork issue tracker
        if: steps.ecosystem-ci-run-branch.outcome == 'failure' || steps.ecosystem-ci-run-commit.outcome == 'failure'
        uses: ./.github/actions/report-failure
        with:
          suite: ${{ matrix.suite }}
          ref-type: ${{ inputs.commit && 'commit' || 'branch' }}
          ref: ${{ inputs.commit || inputs.branchName }}
          vue-repo: ${{ inputs.repo }}
