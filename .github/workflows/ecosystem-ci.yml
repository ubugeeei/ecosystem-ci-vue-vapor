# integration tests for vue ecosystem projects - scheduled or manual run for all suites
name: ecosystem-ci

env:
  # 7 GiB by default on GitHub, setting to 6 GiB
  # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources
  NODE_OPTIONS: --max-old-space-size=6144
  VITE_GIT_HOOKS: "0"

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: "0 5 * * *" # daily 5AM UTC
  workflow_dispatch:
    inputs:
      refType:
        description: "type of ref"
        required: true
        type: choice
        options:
          - branch
          - tag
          - commit
          - release
        default: "branch"
      ref:
        description: "vue ref to use"
        required: true
        type: string
        default: "minor"
      repo:
        description: "vue repository to use"
        required: true
        type: string
        default: "vuejs/core"
  repository_dispatch:
    types: [ecosystem-ci]
jobs:
  test-ecosystem:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - elk
          - language-tools
          - misskey
          # - naive-ui
          - nuxt
          - npmx
          - pinia
          - primevue
          - quasar
          - radix-vue
          - router
          - test-utils
          - vant
          - vapor-interop-fuzz
          - vite-plugin-vue
          - vitepress
          - vue-jsx-vapor
          - vue-i18n
          - vue-macros
          - vuetify
          - vueuse
          - vuefes-2025-website
          - vuejs-docs
          - vue-simple-compiler
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install --frozen-lockfile
      - run: >-
          node ecosystem-ci.ts
          --${{ inputs.refType || github.event.client_payload.refType || 'branch' }} ${{ inputs.ref || github.event.client_payload.ref || 'minor' }}
          --repo ${{ inputs.repo || github.event.client_payload.repo || 'vuejs/core' }}
          ${{ matrix.suite }}
        id: ecosystem-ci-run
        env:
          COREPACK_ENABLE_STRICT: 0
      - if: always()
        run: node discord-webhook.ts
        env:
          WORKFLOW_NAME: ci
          REF_TYPE: ${{ inputs.refType || github.event.client_payload.refType || 'branch' }}
          REF: ${{ inputs.ref || github.event.client_payload.ref || 'minor' }}
          REPO: ${{ inputs.repo || github.event.client_payload.repo || 'vuejs/core' }}
          SUITE: ${{ matrix.suite }}
          STATUS: ${{ job.status }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: report failure to fork issue tracker
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          suite: ${{ matrix.suite }}
          ref-type: ${{ inputs.refType || github.event.client_payload.refType || 'branch' }}
          ref: ${{ inputs.ref || github.event.client_payload.ref || 'minor' }}
          vue-repo: ${{ inputs.repo || github.event.client_payload.repo || 'vuejs/core' }}
