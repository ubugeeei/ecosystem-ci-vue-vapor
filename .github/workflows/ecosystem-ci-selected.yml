# integration tests for vue ecosystem - single run of selected testsuite
name: ecosystem-ci-selected

env:
  # 7 GiB by default on GitHub, setting to 6 GiB
  # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources
  NODE_OPTIONS: --max-old-space-size=6144
  VITE_GIT_HOOKS: "0"

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      refType:
        description: "type of vue ref to use"
        required: true
        type: choice
        options:
          - branch
          - tag
          - commit
          - release
        default: "branch"
      ref:
        description: "vue ref to use"
        required: true
        type: string
        default: "minor"
      repo:
        description: "vue repository to use"
        required: true
        type: string
        default: "vuejs/core"
      suite:
        description: "testsuite to run"
        required: true
        type: choice
        options:
          - elk
          - language-tools
          - misskey
          # - naive-ui
          - nuxt
          - npmx
          - pinia
          - primevue
          - quasar
          - radix-vue
          - router
          - test-utils
          - vant
          - vapor-interop-fuzz
          - vapor-vrt
          - vite-plugin-vue
          - vitepress
          - vue-jsx-vapor
          - vue-i18n
          - vue-macros
          - vuetify
          - vueuse
          - vuefes-2025-website
          - vuejs-docs
          - vue-simple-compiler
jobs:
  execute-selected-suite:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install --frozen-lockfile
      - run: >-
          node ecosystem-ci.ts
          --${{ inputs.refType }} ${{ inputs.ref }}
          --repo ${{ inputs.repo }}
          ${{ inputs.suite }}
        id: ecosystem-ci-run
        env:
          COREPACK_ENABLE_STRICT: 0
      - name: report failure to fork issue tracker
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          suite: ${{ inputs.suite }}
          ref-type: ${{ inputs.refType }}
          ref: ${{ inputs.ref }}
          vue-repo: ${{ inputs.repo }}
